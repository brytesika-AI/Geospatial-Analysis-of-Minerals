name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas numpy httpx python-dotenv pytest
      - name: Compile core app modules
        run: python -m py_compile app/geo_utils.py app/llm_interpreter.py app/streamlit_app.py
      - name: Run tests
        run: pytest -q
